{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Video Analyzer</title>

    <link rel="stylesheet" href="{% static 'inp/css/home.css' %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/your-kit-id.js" crossorigin="anonymous"></script>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>AI Video Analyzer</h1>

        <p class="subtitle">
            Upload a YouTube link, video or audio file and chat with your content using AI.
        </p>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="input-group">

                <label>YouTube URL</label>

                {{ form.youtube_url }}

            </div>

            <div class="divider">
                OR
            </div>

            <div class="input-group">

                <label>Upload Video</label>

                {{ form.video_file }}

            </div>

            <div class="input-group">

                <label>Upload Audio</label>

                {{ form.audio_file }}

            </div>

            <button type="submit" class="btn">
                Analyze
            </button>

        </form>

    </div>

</div>

<script src="{% static 'inp/js/home.js' %}"></script>

</body>
</html>
